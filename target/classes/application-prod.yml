# Configuration de production pour MTDPCE Backend
# À personnaliser selon votre environnement de déploiement

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: mtdpce-api
  
  datasource:
    # À MODIFIER : URL de votre base de données PostgreSQL
    url: jdbc:postgresql://localhost:5432/mtdpce_db
    # À MODIFIER : Nom d'utilisateur de la base de données
    username: mtdpce_user
    # À MODIFIER : Mot de passe de la base de données
    password: ${DB_PASSWORD:mtdpce_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSZ

# Configuration JWT
jwt:
  # À MODIFIER : Clé secrète JWT (minimum 256 bits pour HS256)
  # Générer avec : openssl rand -base64 32
  secret: ${JWT_SECRET:VotreCleSecreteTresLongueEtSecuriseeEnProduction2024!}
  # Durée de validité du token (24 heures en millisecondes)
  expiration: 86400000

# Configuration CORS
cors:
  # À MODIFIER : Domaines autorisés (votre domaine de production)
  allowed-origins: ${CORS_ORIGINS:https://mtdpce.gov.bf,https://www.mtdpce.gov.bf}

# Configuration des logs
logging:
  level:
    root: WARN
    bf.gov.mtdpce: INFO
    org.springframework.security: WARN
  file:
    name: /var/log/mtdpce/application.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Configuration Swagger (désactivé en production)
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

# Configuration actuator pour le monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: MTDPCE API
    description: API du Ministère de la Transition Digitale du Burkina Faso
    version: 1.0.0
