server:
  port: 8096

spring:
  application:
    name: mtdpce-api
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: jdbc:postgresql://localhost:5432/mtdpce_db
    username: mtdpce_user
    password: mtdpce2026
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        default_schema: mtdpce
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Africa/Ouagadougou

# JWT Configuration
jwt:
  secret: MTDPCEBurkinaFaso2024SecretKeyForJWTTokenGenerationAndValidation256Bits
  expiration: 86400000

# Swagger / OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha

# CORS Configuration
cors:
  allowed-origins: http://localhost:4200
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# Logging
logging:
  level:
    root: INFO
    bf.gov.mtdpce: DEBUG
    org.springframework.security: DEBUG

